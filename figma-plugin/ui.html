<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Inter, system-ui, sans-serif; padding: 16px; background: #fff; color: #000; }
    h2 { font-size: 14px; font-weight: 600; margin-bottom: 8px; }
    p { font-size: 11px; color: #71706F; margin-bottom: 12px; line-height: 1.4; }
    textarea {
      width: 100%; height: 200px; border: 1px solid #D8D4D0; border-radius: 6px;
      padding: 10px; font-family: 'SF Mono', monospace; font-size: 11px;
      resize: vertical; outline: none;
    }
    textarea:focus { border-color: #5A0032; }
    .btn-row { display: flex; gap: 8px; margin-top: 12px; }
    button {
      flex: 1; padding: 8px 16px; border-radius: 6px; font-size: 12px;
      font-weight: 500; cursor: pointer; border: none;
    }
    .btn-primary { background: #5A0032; color: #fff; }
    .btn-primary:hover { background: #3d0022; }
    .btn-secondary { background: #F7F5F3; color: #000; border: 1px solid #D8D4D0; }
    .btn-secondary:hover { background: #EBE9E7; }
    .status { font-size: 11px; margin-top: 8px; padding: 6px 10px; border-radius: 4px; display: none; }
    .status.error { display: block; background: #FDF0EF; color: #d32f2f; }
    .status.success { display: block; background: rgba(45,133,65,0.1); color: #2D8541; }
  </style>
</head>
<body>
  <h2>Strawberry Screen Builder</h2>
  <p>Paste a screen definition JSON below, or use "Generate All" to build from the last generated screens.</p>
  
  <textarea id="json-input" placeholder='Paste screen definition JSON here...
  
Or click "Load Example" to see the format.'></textarea>

  <div class="btn-row">
    <button class="btn-primary" id="btn-build">Build in Figma</button>
    <button class="btn-secondary" id="btn-example">Load Example</button>
  </div>
  
  <div id="status" class="status"></div>

  <script>
    var statusEl = document.getElementById('status');
    var inputEl = document.getElementById('json-input');

    function showStatus(msg, type) {
      statusEl.textContent = msg;
      statusEl.className = 'status ' + type;
    }

    document.getElementById('btn-build').addEventListener('click', function() {
      var text = inputEl.value.trim();
      if (!text) {
        showStatus('Please paste a screen definition JSON.', 'error');
        return;
      }
      try {
        var definition = JSON.parse(text);
        showStatus('Building...', 'success');
        parent.postMessage({ pluginMessage: { type: 'build', definition: definition } }, '*');
      } catch (e) {
        showStatus('Invalid JSON: ' + e.message, 'error');
      }
    });

    document.getElementById('btn-example').addEventListener('click', function() {
      var example = {
        "meta": { "component": "ExampleCard" },
        "sections": [
          { "type": "section-header", "title": "Example Section" },
          {
            "type": "card",
            "layout": "grid-4col",
            "columns": [
              {
                "name": "Column 1",
                "fields": [
                  { "label": "Field Name", "value": "Field Value", "hasInfo": true, "infoText": "Tooltip text" },
                  { "label": "Another Field", "value": "Another Value" }
                ]
              },
              {
                "name": "Column 2",
                "fields": [
                  { "label": "Status", "value": "Active", "fieldType": "badge" },
                  { "label": "Link Field", "value": "Click me", "isLink": true }
                ]
              }
            ]
          }
        ]
      };
      inputEl.value = JSON.stringify(example, null, 2);
      showStatus('Example loaded. Click "Build in Figma" to create it.', 'success');
    });

    window.onmessage = function(event) {
      var msg = event.data.pluginMessage;
      if (msg && msg.type === 'status') {
        showStatus(msg.text, msg.level || 'success');
      }
    };
  </script>
</body>
</html>
